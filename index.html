<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculator"> <!-- Main calculator container -->
        <div id="display">0</div> <!-- Calculator display screen, starts at 0 -->
        <div class="row"> <!-- Row of buttons -->
            <button class="bigButton" id="CLEAR">CLEAR</button> <!-- Clears calculator -->
            <button class="bigButton" id="DELETE">DELETE</button> <!-- Deletes last digit -->
        </div>
        <div class="row">
            <button data-number>7</button>
            <button data-number>8</button>
            <button data-number>9</button>
            <button data-operator>÷</button> <!-- Division operator -->
        </div>
        <div class="row">
            <button data-number>4</button>
            <button data-number>5</button>
            <button data-number>6</button>
            <button data-operator>x</button> <!-- Multiplication operator -->
        </div>
        <div class="row">
            <button data-number>1</button>
            <button data-number>2</button>
            <button data-number>3</button>
            <button data-operator>-</button> <!-- Subtraction operator -->
        </div>
        <div class="row">
            <button data-number>0</button>
            <button id=".">.</button> <!-- Decimal point button -->
            <button id="=">=</button> <!-- Equals button -->
            <button data-operator>+</button> <!-- Addition operator -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
